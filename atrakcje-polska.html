<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="referrer" content="no-referrer">
<title>Atrakcje Polski</title>
<link rel="manifest" href="manifest-polska.json">
<meta name="theme-color" content="#1e2d40">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Atrakcje Polski">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Odkryj Polskę – zamki, szczyty, muzea, parki narodowe i setki innych atrakcji.">
<link rel="apple-touch-icon" href="icon-polska-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-polska-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1e2d40;--paper:#f5edd6;--parchment:#ede5c8;--accent:#e8753a;--moss:#4a6741;--sky:#4a7fa5;--muted:#7a8a99;--checked-bg:#eaf5ea;--tab-h:52px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Lato',sans-serif;min-height:100vh;padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom));}
header{background:var(--ink);color:var(--paper);padding:0;text-align:center;position:relative;overflow:hidden;}
.header-bg{position:absolute;inset:0;width:100%;height:100%;}
.header-content{position:relative;z-index:1;padding:1.6rem 1.5rem 1.2rem;}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,5vw,2.6rem);font-weight:900;}
h1 span{color:var(--accent);}
.subtitle{font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,237,214,.45);margin-top:.25rem;font-weight:300;}
.progress-bar{height:3px;background:rgba(255,255,255,.12);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--moss),var(--accent));transition:width .4s ease;}
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + env(safe-area-inset-bottom));background:var(--ink);display:flex;z-index:50;border-top:1px solid rgba(255,255,255,.1);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding-bottom:env(safe-area-inset-bottom);cursor:pointer;border:none;background:transparent;color:rgba(245,237,214,.4);font-family:'Lato',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;transition:color .2s;position:relative;}
.tab-btn.active{color:var(--accent);}
.tab-icon{font-size:1.2rem;line-height:1;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.controls{display:flex;flex-direction:column;gap:.3rem;padding:.5rem .8rem;background:var(--parchment);border-bottom:1px solid rgba(0,0,0,.08);position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.controls-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center;}
.stats-line{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--muted);}
.stats-line strong{color:var(--moss);font-size:1.05rem;}
.region-chips{display:flex;gap:.3rem;overflow-x:auto;padding-bottom:.1rem;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.region-chips::-webkit-scrollbar{display:none;}
.rchip{font-size:.65rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:.28rem .65rem;border:1.5px solid rgba(0,0,0,.2);background:transparent;color:var(--muted);cursor:pointer;border-radius:20px;transition:all .15s;white-space:nowrap;font-family:'Lato',sans-serif;}
.rchip.active{background:var(--ink);border-color:var(--ink);color:var(--paper);}
select,input[type=text]{font-family:'Lato',sans-serif;font-size:.78rem;color:var(--ink);background:var(--paper);border:1.5px solid rgba(0,0,0,.2);border-radius:3px;padding:.38rem .6rem;}
select:focus,input:focus{outline:none;border-color:var(--accent);}
#search-input{flex:1;min-width:140px;}
button{font-family:'Lato',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.38rem .85rem;border:1.5px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;transition:all .18s;border-radius:2px;}
button:hover{background:var(--ink);color:var(--paper);}
button.active{background:var(--ink);color:var(--paper);}
button.danger{border-color:#c0392b;color:#c0392b;}
button.danger:hover{background:#c0392b;color:white;}
.category-section{margin:0;}
.category-header{display:flex;align-items:center;gap:.6rem;padding:.8rem 1.1rem .35rem;cursor:pointer;user-select:none;}
.category-header h2{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);flex:1;}
.cat-count{font-size:.7rem;color:var(--muted);font-weight:300;}
.cat-toggle{font-size:.7rem;color:var(--muted);transition:transform .2s;}
.category-section.collapsed .cat-toggle{transform:rotate(-90deg);}
.category-section.collapsed .items-list{display:none!important;}
.items-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:0;padding:0 .7rem .7rem;}
.item{display:flex;align-items:flex-start;gap:.55rem;padding:.55rem .65rem;cursor:default;border-radius:4px;transition:background .15s;user-select:none;}
.item:hover{background:rgba(0,0,0,.04);}
.item.checked{background:var(--checked-bg);}
.item.checked .item-name{text-decoration:line-through;color:var(--moss);opacity:.75;}
.item.checked .item-short{opacity:.5;}
.checkbox{width:16px;height:16px;min-width:16px;border:2px solid rgba(0,0,0,.22);border-radius:3px;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s;font-size:.62rem;color:white;background:transparent;flex-shrink:0;cursor:pointer;}
.item.checked .checkbox{background:var(--moss);border-color:var(--moss);}
.item-idx{font-size:.6rem;font-weight:700;color:var(--muted);min-width:20px;text-align:right;margin-top:3px;flex-shrink:0;}
.item-body{flex:1;min-width:0;}
.item-name{font-weight:700;font-size:.83rem;color:var(--ink);line-height:1.3;cursor:pointer;}
.item-short{font-size:.68rem;color:var(--muted);font-weight:300;margin-top:.08rem;line-height:1.35;}
.item-meta{display:flex;gap:.4rem;margin-top:.2rem;flex-wrap:wrap;align-items:center;}
.badge{font-size:.58rem;font-weight:700;letter-spacing:.06em;padding:.12rem .38rem;border-radius:2px;text-transform:uppercase;}
.badge-woj{background:rgba(232,117,58,.1);color:#a04010;}
.badge-dist{background:rgba(74,127,165,.12);color:var(--sky);}
.badge-kgp{background:rgba(232,117,58,.2);color:#7a2a00;border:1px solid rgba(232,117,58,.3);}
.badge-kids{background:rgba(74,127,165,.12);color:#2a5a7a;}
.info-btn{font-size:.58rem;font-weight:700;letter-spacing:.06em;padding:.12rem .42rem;border-radius:2px;background:rgba(232,117,58,.13);color:#8b3500;border:none;cursor:pointer;white-space:nowrap;transition:background .15s;font-family:'Lato',sans-serif;text-transform:uppercase;}
.info-btn:hover{background:rgba(232,117,58,.3);}
.add-to-plan-btn{font-size:.58rem;font-weight:700;letter-spacing:.06em;padding:.12rem .42rem;border-radius:2px;background:rgba(74,103,65,.1);color:var(--moss);border:1.5px solid rgba(74,103,65,.25);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Lato',sans-serif;text-transform:uppercase;}
.add-to-plan-btn:hover,.add-to-plan-btn.in-plan{background:var(--moss);color:white;border-color:var(--moss);}
.item-stars{font-size:.75rem;color:#f0b429;margin-top:.08rem;letter-spacing:1px;}
.item-note-badge{font-size:.65rem;color:var(--moss);margin-top:.08rem;}
.divider{height:1px;background:rgba(0,0,0,.05);margin:0 1.1rem;}
.hidden{display:none!important;}
.no-results{padding:3rem 1rem;text-align:center;color:var(--muted);font-style:italic;}
.modal-overlay{position:fixed;inset:0;background:rgba(10,15,25,.72);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-wrapper{position:relative;width:100%;max-width:540px;}
.modal{background:var(--paper);width:100%;max-height:88vh;border-radius:14px 14px 0 0;overflow:hidden;display:flex;flex-direction:column;transform:translateY(40px);transition:transform .28s ease;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-img{width:100%;height:210px;object-fit:cover;flex-shrink:0;}
.modal-img-placeholder{width:100%;height:200px;background:var(--parchment);display:flex;align-items:center;justify-content:center;font-size:3.5rem;flex-shrink:0;}
.modal-body{padding:1.2rem 1.4rem 1.8rem;overflow-y:auto;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;color:var(--ink);line-height:1.2;}
.modal-badges{display:flex;gap:.45rem;margin:.55rem 0 .85rem;flex-wrap:wrap;}
.modal-badge{font-size:.66rem;font-weight:700;padding:.18rem .52rem;border-radius:3px;letter-spacing:.07em;text-transform:uppercase;}
.modal-btn-row{display:flex;gap:.5rem;margin:.4rem 0 .7rem;flex-wrap:wrap;}
.modal-nav-btn{display:inline-block;padding:.48rem 1.1rem;background:var(--moss);color:white;text-decoration:none;border-radius:4px;font-size:.8rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.modal-desc{font-size:.87rem;line-height:1.72;color:var(--ink);}
.modal-close{position:absolute;top:.75rem;right:.85rem;width:2rem;height:2rem;border-radius:50%;background:rgba(0,0,0,.4);color:white;border:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;z-index:201;}
.modal-user-section{margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(0,0,0,.1);}
.modal-section-label{font-size:.63rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:.32rem;}
.star-row{display:flex;gap:4px;}
.star{font-size:1.5rem;color:#ccc;cursor:pointer;transition:color .12s;line-height:1;user-select:none;}
.star.active{color:#f0b429;}
.modal-input{width:100%;padding:.42rem .65rem;border:1.5px solid rgba(0,0,0,.15);background:var(--parchment);font-family:'Lato',sans-serif;font-size:.82rem;color:var(--ink);border-radius:2px;margin-top:.2rem;}
.modal-textarea{min-height:65px;resize:vertical;line-height:1.5;}
.modal-input:focus{outline:none;border-color:var(--accent);}
#map-panel{padding:.5rem;}
#leaflet-map{height:calc(100vh - 190px);min-height:350px;border-radius:8px;overflow:hidden;}
.map-ctrl-btn{font-size:.68rem;padding:.3rem .7rem;}
.map-ctrl-btn.active{background:var(--ink);color:var(--paper);}
#planner-panel{padding:.8rem 1rem;}
.planner-empty{color:var(--muted);font-size:.87rem;font-style:italic;padding:1rem 0;}
.planner-route-item{display:flex;align-items:center;gap:.55rem;padding:.48rem .6rem;background:var(--parchment);border:1px solid rgba(0,0,0,.08);border-radius:3px;margin-bottom:.35rem;font-size:.8rem;}
.planner-route-step{font-size:.65rem;font-weight:900;color:var(--moss);min-width:22px;flex-shrink:0;}
.planner-route-name{flex:1;font-weight:700;}
.planner-route-dist{font-size:.68rem;color:var(--muted);flex-shrink:0;}
.planner-remove-btn{font-size:.7rem;color:#c0392b;cursor:pointer;border:none;background:none;padding:0 .3rem;flex-shrink:0;}
.planner-summary{background:var(--parchment);border:1px solid rgba(0,0,0,.1);padding:.75rem 1rem;border-radius:3px;margin:.7rem 0;display:flex;gap:1.5rem;flex-wrap:wrap;}
.planner-sum-item{font-size:.78rem;color:var(--ink);}
.planner-sum-item strong{color:var(--moss);font-size:1rem;font-family:'Playfair Display',serif;}
.planner-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.7rem;}
.planner-gmaps-btn{font-family:'Lato',sans-serif;font-size:.76rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.48rem 1.1rem;background:var(--moss);color:white;border:none;cursor:pointer;border-radius:3px;text-decoration:none;display:inline-block;}
.planner-count-badge{display:inline-block;background:var(--accent);color:white;border-radius:50%;width:15px;height:15px;font-size:.58rem;font-weight:900;text-align:center;line-height:15px;position:absolute;top:6px;right:14px;}
#stats-panel{padding:.8rem 1rem 2rem;}
.stats-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;color:var(--ink);margin-bottom:1rem;}
.stats-section{margin-bottom:1.4rem;}
.stats-section-title{font-size:.63rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.65rem;}
.stats-overall{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:.7rem;}
.stat-card{background:var(--parchment);border:1px solid rgba(0,0,0,.08);padding:.7rem .9rem;text-align:center;border-radius:3px;}
.stat-card-num{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;color:var(--moss);line-height:1;}
.stat-card-label{font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:.25rem;}
.cat-bar-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem;}
.cat-bar-icon{font-size:.95rem;width:22px;text-align:center;flex-shrink:0;}
.cat-bar-name{font-size:.72rem;color:var(--ink);width:155px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cat-bar-track{flex:1;height:9px;background:rgba(0,0,0,.07);border-radius:5px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:5px;transition:width .6s ease;}
.cat-bar-count{font-size:.7rem;color:var(--muted);width:36px;text-align:right;flex-shrink:0;}
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:.65rem;}
.badge-card{padding:.75rem;background:var(--parchment);border:1.5px solid rgba(0,0,0,.1);border-radius:3px;text-align:center;}
.badge-card.earned{border-color:var(--accent);background:rgba(232,117,58,.06);}
.badge-card.locked{opacity:.4;filter:grayscale(1);}
.badge-icon{font-size:1.7rem;margin-bottom:.25rem;}
.badge-name{font-size:.7rem;font-weight:700;color:var(--ink);margin-bottom:.12rem;}
.badge-desc{font-size:.6rem;color:var(--muted);line-height:1.3;}
body.dark{--paper:#151f2b;--parchment:#1c2a38;--ink:#f5edd6;--muted:#8a9aaa;--checked-bg:#1a2e1a;}
body.dark .controls{background:#1c2a38;}
body.dark select,body.dark input,body.dark textarea{background:#1c2a38;color:#f5edd6;border-color:rgba(255,255,255,.2);}
body.dark .rchip{color:rgba(245,237,214,.5);border-color:rgba(255,255,255,.2);}
body.dark .rchip.active{background:var(--accent);border-color:var(--accent);color:white;}
body.dark button{border-color:rgba(255,255,255,.3);color:#f5edd6;}
body.dark button:hover,body.dark button.active{background:rgba(255,255,255,.15);}
body.dark .item:hover{background:rgba(255,255,255,.04);}
body.dark .modal{background:#1c2a38;}
body.dark .modal-title,body.dark .modal-desc{color:#f5edd6;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);border-radius:2px;}
footer{text-align:center;padding:1.2rem;font-size:.7rem;color:var(--muted);border-top:1px solid rgba(0,0,0,.07);margin-top:.5rem;}
@media(min-width:600px){.modal-overlay{align-items:center;}.modal{border-radius:14px;max-height:82vh;}.modal-img,.modal-img-placeholder{height:250px;}}
@media(max-width:400px){.items-list{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
<svg class="header-bg" viewBox="0 0 400 110" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="110" fill="#1e2d40"/>
  <circle cx="200" cy="-5" r="75" fill="#e8753a" opacity="0.22"/>
  <circle cx="200" cy="8" r="50" fill="#e8753a" opacity="0.15"/>
  <polygon points="80,110 155,32 230,110" fill="#253545"/>
  <polygon points="140,110 210,16 280,110" fill="#1e2d40"/>
  <polygon points="200,110 265,36 330,110" fill="#253545"/>
  <polygon points="245,110 308,52 370,110" fill="#1a2535"/>
  <polygon points="28,110 98,56 168,110" fill="#1a2535"/>
  <polygon points="155,32 174,60 136,60" fill="#f5edd6" opacity="0.72"/>
  <polygon points="210,16 228,48 192,48" fill="#f5edd6" opacity="0.78"/>
  <polygon points="265,36 281,58 249,58" fill="#f5edd6" opacity="0.62"/>
</svg>
<div class="header-content">
  <h1>Atrakcje <span>Polski</span></h1>
  <div class="subtitle" id="header-subtitle">odkryj kraj</div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</header>

<div id="tab-lista" class="tab-panel active">
<div class="controls">
  <div class="controls-row" style="justify-content:space-between;">
    <div class="stats-line" id="stats-line">Ładowanie…</div>
    <div style="display:flex;gap:.3rem;flex-wrap:wrap;">
      <button id="filter-all" class="active" onclick="setFilter('all',this)">Wszystkie</button>
      <button id="filter-todo" onclick="setFilter('todo',this)">Do zrobienia</button>
      <button id="filter-done" onclick="setFilter('done',this)">Zaliczone</button>
    </div>
  </div>
  <div class="region-chips">
    <button class="rchip active" data-region="all" onclick="setRegion('all',this)">🇵🇱 Cała Polska</button>
    <button class="rchip" data-region="poludnie" onclick="setRegion('poludnie',this)">🏔️ Południe</button>
    <button class="rchip" data-region="zachod" onclick="setRegion('zachod',this)">🌿 Zachód</button>
    <button class="rchip" data-region="centrum" onclick="setRegion('centrum',this)">🏛️ Centrum</button>
    <button class="rchip" data-region="wschod" onclick="setRegion('wschod',this)">🌻 Wschód</button>
    <button class="rchip" data-region="polnoc" onclick="setRegion('polnoc',this)">⚓ Północ</button>
  </div>
  <div class="controls-row">
    <select id="woj-filter" onchange="setWoj(this.value)">
      <option value="">Wszystkie województwa</option>
      <option value="dolnoslaskie">Dolnośląskie</option>
      <option value="kujawsko-pomorskie">Kujawsko-Pomorskie</option>
      <option value="lubelskie">Lubelskie</option>
      <option value="lubuskie">Lubuskie</option>
      <option value="lodzkie">Łódzkie</option>
      <option value="malopolskie">Małopolskie</option>
      <option value="mazowieckie">Mazowieckie</option>
      <option value="opolskie">Opolskie</option>
      <option value="podkarpackie">Podkarpackie</option>
      <option value="podlaskie">Podlaskie</option>
      <option value="pomorskie">Pomorskie</option>
      <option value="slaskie">Śląskie</option>
      <option value="swietokrzyskie">Świętokrzyskie</option>
      <option value="warminsko-mazurskie">Warmińsko-Mazurskie</option>
      <option value="wielkopolskie">Wielkopolskie</option>
      <option value="zachodniopomorskie">Zachodniopomorskie</option>
    </select>
    <select id="sort-filter" onchange="setSort(this.value)">
      <option value="default">Kolejność domyślna</option>
      <option value="az">A–Z</option>
      <option value="dist-asc">Odległość ↑</option>
      <option value="dist-desc">Odległość ↓</option>
      <option value="rating">Ocena ↓</option>
    </select>
    <button onclick="toggleKids(this)" id="kids-btn">👶 Rodzinne</button>
  </div>
  <div class="controls-row">
    <input type="text" id="search-input" placeholder="🔍 szukaj atrakcji…" oninput="setSearch(this.value)">
    <button onclick="toggleDark()">🌙</button>
    <button class="danger" onclick="confirmReset()">↺</button>
  </div>
</div>
<div id="app"></div>
<footer>Atrakcje Polski · dane lokalne w przeglądarce · start: Wrocław</footer>
</div>

<div id="tab-mapa" class="tab-panel">
<div class="controls">
  <div class="controls-row" style="justify-content:space-between;">
    <span class="stats-line">Mapa atrakcji</span>
    <div style="display:flex;gap:.3rem;">
      <button class="map-ctrl-btn active" onclick="mapFilter('all',this)">Wszystkie</button>
      <button class="map-ctrl-btn" onclick="mapFilter('done',this)">Zaliczone</button>
      <button class="map-ctrl-btn" onclick="mapFilter('todo',this)">Do zrobienia</button>
    </div>
  </div>
</div>
<div id="map-panel">
  <div id="leaflet-map"></div>
  <div id="map-legend" style="display:flex;flex-wrap:wrap;gap:.35rem;padding:.55rem .3rem;font-size:.67rem;"></div>
</div>
</div>

<div id="tab-planer" class="tab-panel">
<div class="controls">
  <div class="controls-row" style="justify-content:space-between;">
    <span class="stats-line">Planer wycieczki</span>
    <span style="font-size:.72rem;color:var(--muted);">start/meta: Wrocław</span>
  </div>

// ════════════════════════════════════════════════════
// ODLEGŁOŚĆ HAVERSINE
// ════════════════════════════════════════════════════
function haversine(lat1,lng1,lat2,lng2){
  const R=6371,dL=(lat2-lat1)*Math.PI/180,dG=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dG/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
function dist(item){
  return item.lat ? haversine(WROCLAW.lat,WROCLAW.lng,item.lat,item.lng) : (item.km||0);
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('#tab-lista .controls button[id^=filter]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function setRegion(r,btn){
  currentRegion=r; currentWoj='';
  document.getElementById('woj-filter').value='';
  document.querySelectorAll('.rchip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function setWoj(v){
  currentWoj=v;
  if(v){ currentRegion='all'; document.querySelectorAll('.rchip').forEach(b=>b.classList.remove('active')); document.querySelector('.rchip[data-region="all"]').classList.add('active'); }
  applyFilters();
}
function setSort(v){ currentSort=v; render(); }
function setSearch(v){ currentSearch=v.toLowerCase().trim(); applyFilters(); }
function toggleKids(btn){ kidsOnly=!kidsOnly; btn.classList.toggle('active',kidsOnly); applyFilters(); }
function confirmReset(){ if(confirm('Wyczyścić wszystkie zaliczenia i dane?')){ checked={}; userData={}; save(); saveUDL(); render(); } }
function toggleDark(){ document.body.classList.toggle('dark'); }

function passGeo(item){
  if(currentWoj) return item.woj===currentWoj;
  if(currentRegion!=='all') return (REGION_WOJ[currentRegion]||[]).includes(item.woj);
  return true;
}

function applyFilters(){
  let any=false;
  document.querySelectorAll('.item').forEach(el=>{
    const [ci,ii]=el.dataset.key.split('_').map(Number);
    const item=DATA[ci].items[ii];
    const done=!!checked[el.dataset.key];
    const pf=currentFilter==='all'||(currentFilter==='done'&&done)||(currentFilter==='todo'&&!done);
    const ps=!currentSearch||el.dataset.name.includes(currentSearch);
    const pg=passGeo(item);
    const pk=!kidsOnly||(item.kids===true);
    const vis=pf&&ps&&pg&&pk;
    el.classList.toggle('hidden',!vis);
    if(vis)any=true;
  });
  document.querySelectorAll('.category-section').forEach(sec=>{
    sec.classList.toggle('hidden',sec.querySelectorAll('.item:not(.hidden)').length===0);
  });
  let nr=document.getElementById('no-results');
  if(!any){
    if(!nr){nr=document.createElement('div');nr.id='no-results';nr.className='no-results';nr.textContent='Brak wyników — zmień filtry lub wyszukiwanie';document.getElementById('app').appendChild(nr);}
    nr.style.display='block';
  } else if(nr) nr.style.display='none';
  updateStats();
}

// ════════════════════════════════════════════════════
// BUDOWANIE ELEMENTU ATRAKCJI
// ════════════════════════════════════════════════════
function buildItemEl(item,ci,ii,key,done,ud,idx){
  const inPlan=plannerItems.includes(key);
  const el=document.createElement('div');
  el.className='item'+(done?' checked':'');
  el.dataset.key=key;
  el.dataset.name=item.name.toLowerCase();
  el.dataset.kids=item.kids?'1':'0';
  const km=dist(item);
  el.innerHTML=`
    <span class="item-idx">${String(idx).padStart(3,'0')}</span>
    <span class="checkbox">${done?'✓':''}</span>
    <div class="item-body">
      <div class="item-name">${item.name}</div>
      <div class="item-short">${item.short||''}</div>
      ${ud.rating>0?`<div class="item-stars">${'★'.repeat(ud.rating)}${'☆'.repeat(5-ud.rating)}</div>`:''}
      ${ud.note?`<div class="item-note-badge">📝 ${ud.note.slice(0,40)}${ud.note.length>40?'…':''}</div>`:''}
      <div class="item-meta">
        <span class="badge badge-woj">${item.woj||''}</span>
        ${km?`<span class="badge badge-dist">📍 ${km} km</span>`:''}
        ${item.kgp?`<span class="badge badge-kgp">👑 KGP</span>`:''}
        ${item.kids?`<span class="badge badge-kids">👶</span>`:''}
        <button class="info-btn" onclick="openModal(${ci},${ii},'${key}')">📖 opis</button>
        <button class="add-to-plan-btn${inPlan?' in-plan':''}" onclick="togglePlanItem('${key}',this)">+ Plan</button>
      </div>
    </div>`;
  el.querySelector('.checkbox').addEventListener('click',e=>{e.stopPropagation();toggle(key,el);});
  el.querySelector('.item-name').addEventListener('click',e=>{e.stopPropagation();toggle(key,el);});
  return el;
}

// ════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════
function render(){
  globalIdx=1;
  const app=document.getElementById('app');
  app.innerHTML='';

  if(currentSort!=='default'){
    let all=[];
    DATA.forEach((cat,ci)=>cat.items.forEach((item,ii)=>{
      const key=getKey(ci,ii);
      all.push({cat,ci,item,ii,key,done:!!checked[key],ud:userData[key]||{}});
    }));
    if(currentSort==='az') all.sort((a,b)=>a.item.name.localeCompare(b.item.name,'pl'));
    else if(currentSort==='dist-asc') all.sort((a,b)=>dist(a.item)-dist(b.item));
    else if(currentSort==='dist-desc') all.sort((a,b)=>dist(b.item)-dist(a.item));
    else if(currentSort==='rating') all.sort((a,b)=>((b.ud.rating||0)-(a.ud.rating||0)));
    const sec=document.createElement('div'); sec.className='category-section';
    const hdr=document.createElement('div'); hdr.className='category-header';
    hdr.innerHTML=`<span>↕</span><h2>Posortowane</h2><span class="cat-count">${all.length}</span><span class="cat-toggle">▾</span>`;
    hdr.addEventListener('click',()=>sec.classList.toggle('collapsed'));
    const list=document.createElement('div'); list.className='items-list';
    all.forEach(({ci,item,ii,key,done,ud})=>list.appendChild(buildItemEl(item,ci,ii,key,done,ud,globalIdx++)));
    sec.appendChild(hdr); sec.appendChild(list); app.appendChild(sec);
    applyFilters(); return;
  }

  DATA.forEach((cat,ci)=>{
    const sec=document.createElement('div'); sec.className='category-section';
    const hdr=document.createElement('div'); hdr.className='category-header';
    const icon=cat.cat.split(' ')[0];
    const name=cat.cat.replace(/^\S+ /,'');
    const catDone=cat.items.filter((_,ii)=>!!checked[getKey(ci,ii)]).length;
    hdr.innerHTML=`<span style="font-size:1.1rem">${icon}</span><h2>${name}</h2><span class="cat-count">${catDone}/${cat.items.length}</span><span class="cat-toggle">▾</span>`;
    hdr.style.borderLeft=`3px solid ${cat.color}`;
    hdr.addEventListener('click',()=>sec.classList.toggle('collapsed'));
    const list=document.createElement('div'); list.className='items-list';
    cat.items.forEach((item,ii)=>{
      const key=getKey(ci,ii);
      list.appendChild(buildItemEl(item,ci,ii,key,!!checked[key],userData[key]||{},globalIdx++));
    });
    sec.appendChild(hdr); sec.appendChild(list); app.appendChild(sec);
    app.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  });
  applyFilters();
}

// ════════════════════════════════════════════════════
function toggle(key,el){
  if(checked[key]) delete checked[key]; else checked[key]=Date.now();
  save();
  const done=!!checked[key];
  el.classList.toggle('checked',done);
  el.querySelector('.checkbox').textContent=done?'✓':'';
  updateStats();
}

  document.getElementById('stats-line').innerHTML=`Zaliczone: <strong>${done}</strong> / ${total}`;

}

// STATYSTYKI — panel
// ════════════════════════════════════════════════════
function renderStats(){
  const total=DATA.reduce((s,c)=>s+c.items.length,0);
  const done=Object.keys(checked).length;
  const rated=Object.values(userData).filter(u=>u.rating>0);
  const avg=rated.length?rated.reduce((s,u)=>s+u.rating,0)/rated.length:0;

  let html=`<div class="stats-section"><div class="stats-section-title">Ogólny postęp</div>
  <div class="stats-overall">
    <div class="stat-card"><div class="stat-card-num">${done}</div><div class="stat-card-label">Zaliczonych</div></div>
    <div class="stat-card"><div class="stat-card-num">${total-done}</div><div class="stat-card-label">Pozostało</div></div>
    <div class="stat-card"><div class="stat-card-num">${Math.round(done/total*100)}%</div><div class="stat-card-label">Procent</div></div>
    <div class="stat-card"><div class="stat-card-num">${avg.toFixed(1)}</div><div class="stat-card-label">Śr. ocena</div></div>
  </div></div>`;

  html+=`<div class="stats-section"><div class="stats-section-title">Postęp per kategoria</div>`;
  DATA.forEach((cat,ci)=>{
    const cd=cat.items.filter((_,ii)=>!!checked[getKey(ci,ii)]).length;
    const pct=cat.items.length?cd/cat.items.length*100:0;
    html+=`<div class="cat-bar-row">
      <div class="cat-bar-icon">${cat.cat.split(' ')[0]}</div>
      <div class="cat-bar-name">${cat.cat.replace(/^\S+ /,'')}</div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${cat.color}"></div></div>
      <div class="cat-bar-count">${cd}/${cat.items.length}</div>
    </div>`;
  });
  html+='</div>';

  const BADGES=[
    {icon:'🌱',name:'Pierwszy krok',  desc:'Zalicz 1 atrakcję',       ok:()=>done>=1},
    {icon:'🔟',name:'Dziesiątka',     desc:'Zalicz 10 atrakcji',      ok:()=>done>=10},
    {icon:'🥈',name:'Pięćdziesiątka',desc:'Zalicz 50 atrakcji',      ok:()=>done>=50},
    {icon:'🥇',name:'Setka',          desc:'Zalicz 100 atrakcji',     ok:()=>done>=100},
    {icon:'🏆',name:'Dwieście',       desc:'Zalicz 200 atrakcji',     ok:()=>done>=200},
    {icon:'👑',name:'Korona Zdobyta', desc:'10 szczytów KGP',         ok:()=>DATA[0].items.filter((_,ii)=>!!checked[getKey(0,ii)]).length>=10},
    {icon:'🏔️',name:'Zdobywca Korony',desc:'Wszystkie 28 KGP',       ok:()=>DATA[0].items.filter((_,ii)=>!!checked[getKey(0,ii)]).length>=DATA[0].items.length},
    {icon:'⛰️',name:'Taternik',       desc:'Zdobądź Rysy',            ok:()=>!!checked[getKey(0,0)]},
    {icon:'🦬',name:'Król Puszcz',    desc:'Odwiedź Białowieżę',      ok:()=>!!checked[getKey(8,1)]},
    {icon:'🌿',name:'Parkowicz',      desc:'5 parków narodowych',      ok:()=>DATA[8].items.filter((_,ii)=>!!checked[getKey(8,ii)]).length>=5},
    {icon:'⚓',name:'Wilk Morski',    desc:'5 miejsc nad Bałtykiem',  ok:()=>DATA[9].items.filter((_,ii)=>!!checked[getKey(9,ii)]).length>=5},
    {icon:'🏛️',name:'UNESCO Kolekcjoner',desc:'Wszystkie miejsca UNESCO', ok:()=>DATA[12].items.filter((_,ii)=>!!checked[getKey(12,ii)]).length>=DATA[12].items.length},
    {icon:'📜',name:'Historyk',       desc:'10 miejsc historii',       ok:()=>DATA[5].items.filter((_,ii)=>!!checked[getKey(5,ii)]).length>=10},
    {icon:'🔭',name:'Astronom',       desc:'Odwiedź Frombork',         ok:()=>DATA[2].items.some((it,ii)=>it.name.includes('Frombork')&&!!checked[getKey(2,ii)])},
  ];
  html+=`<div class="stats-section"><div class="stats-section-title">Odznaki</div><div class="badges-grid">`;
  BADGES.forEach(b=>{
    const e=b.ok();
    html+=`<div class="badge-card ${e?'earned':'locked'}"><div class="badge-icon">${b.icon}</div><div class="badge-name">${b.name}</div><div class="badge-desc">${b.desc}</div></div>`;
  });
  html+='</div></div>';
  document.getElementById('stats-content').innerHTML=html;
}

// ════════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════════
window.openModal=function(ci,ii,key){
  currentModalKey=key;
  const item=DATA[ci].items[ii];
  document.getElementById('modal-title').textContent=item.name;
  const wrap=document.getElementById('modal-img-wrap');
  wrap.innerHTML=`<div class="modal-img-placeholder">${DATA[ci].cat.split(' ')[0]}</div>`;
  const km=dist(item);
  document.getElementById('modal-badges').innerHTML=`
    <span class="modal-badge" style="background:rgba(232,117,58,.15);color:#8b3500;">${item.woj||''}</span>
    ${km?`<span class="modal-badge" style="background:rgba(74,127,165,.15);color:#2a5a80;">📍 ${km} km od Wrocławia</span>`:''}
    ${item.kgp?`<span class="modal-badge" style="background:rgba(232,117,58,.25);color:#6b2a00;">👑 KGP</span>`:''}
    ${item.kids?`<span class="modal-badge" style="background:rgba(74,127,165,.15);color:#2a5a80;">👶 Rodzinne</span>`:''}`;
  const btnRow=document.getElementById('modal-btn-row');
  btnRow.innerHTML=item.lat
    ?`<a class="modal-nav-btn" href="https://maps.google.com/?q=${item.lat},${item.lng}" target="_blank">🗺️ Google Maps</a>
       <a class="modal-nav-btn" style="background:var(--sky);" href="https://www.openstreetmap.org/?mlat=${item.lat}&mlon=${item.lng}#map=14/${item.lat}/${item.lng}" target="_blank">📍 OSM</a>`:'';
  document.getElementById('modal-desc').textContent=item.desc||'';
  const ud=userData[key]||{};
  document.getElementById('modal-date').value=ud.date||'';
  document.getElementById('modal-note').value=ud.note||'';
  const stEl=document.getElementById('modal-stars');
  stEl.innerHTML=[1,2,3,4,5].map(v=>`<span class="star${(ud.rating||0)>=v?' active':''}" data-v="${v}" onclick="setRating('${key}',${v})">★</span>`).join('');
  document.getElementById('modal-overlay').classList.add('open');
};

window.closeModal=function(){
  document.getElementById('modal-overlay').classList.remove('open');
  saveUD_modal();
};
window.closeModalOverlay=function(e){
  if(e.target===document.getElementById('modal-overlay')) closeModal();
};

function saveUD_modal(){
  if(!currentModalKey)return;
  if(!userData[currentModalKey])userData[currentModalKey]={};
  userData[currentModalKey].date=document.getElementById('modal-date').value;
  userData[currentModalKey].note=document.getElementById('modal-note').value;
  saveUDL();
}
window.saveUD=saveUD_modal;

window.setRating=function(key,v){
  if(!userData[key])userData[key]={};
  userData[key].rating=userData[key].rating===v?0:v;
  saveUDL();
  document.querySelectorAll('#modal-stars .star').forEach(s=>s.classList.toggle('active',Number(s.dataset.v)<=(userData[key].rating||0)));
  const el=document.querySelector(`.item[data-key="${key}"]`);
  if(el){
    let se=el.querySelector('.item-stars');
    if(!se){se=document.createElement('div');se.className='item-stars';el.querySelector('.item-body').insertBefore(se,el.querySelector('.item-meta'));}
    se.textContent=userData[key].rating>0?'★'.repeat(userData[key].rating)+'☆'.repeat(5-userData[key].rating):'';
  }
};

// ════════════════════════════════════════════════════
// PLANER — TSP
// ════════════════════════════════════════════════════
window.togglePlanItem=function(key,btn){
  const idx=plannerItems.indexOf(key);
  if(idx>=0){ plannerItems.splice(idx,1); }
  else { if(plannerItems.length>=8){alert('Maksymalnie 8 atrakcji w trasie.');return;} plannerItems.push(key); }
  savePl(); updatePlannerBadge();
  document.querySelectorAll('.add-to-plan-btn').forEach(b=>{
    const k=b.closest('.item')?.dataset.key;
    if(k) b.classList.toggle('in-plan',plannerItems.includes(k));
  });
  if(document.getElementById('tab-planer').classList.contains('active')) renderPlanner();
};

function updatePlannerBadge(){
  const b=document.getElementById('planner-badge');
  b.textContent=plannerItems.length;
  b.style.display=plannerItems.length>0?'block':'none';
}

function keyToItem(key){
  const [ci,ii]=key.split('_').map(Number);
  return DATA[ci]?.items[ii];
}

function solveTSP(stops){
  if(stops.length<=1) return {order:stops.map((_,i)=>i),dist:0};
  const n=stops.length;
  let best=null,bestD=Infinity;
  const perm=(arr,cur=[])=>{
    if(cur.length===n){
      let d=haversine(WROCLAW.lat,WROCLAW.lng,stops[cur[0]].item.lat,stops[cur[0]].item.lng);
      for(let i=0;i<n-1;i++) d+=haversine(stops[cur[i]].item.lat,stops[cur[i]].item.lng,stops[cur[i+1]].item.lat,stops[cur[i+1]].item.lng);
      d+=haversine(stops[cur[n-1]].item.lat,stops[cur[n-1]].item.lng,WROCLAW.lat,WROCLAW.lng);
      if(d<bestD){bestD=d;best=[...cur];} return;
    }
    arr.forEach((v,i)=>perm([...arr.slice(0,i),...arr.slice(i+1)],[...cur,v]));
  };
  if(n<=7) perm([...Array(n).keys()]);
  else { best=Array.from({length:n},(_,i)=>i); }
  return {order:best,dist:bestD};
}

function renderPlanner(){
  const el=document.getElementById('planner-content');
  if(plannerItems.length===0){el.innerHTML='<div class="planner-empty">Brak atrakcji w planerze. Dodaj przez „+ Plan" na liście.</div>';return;}
  const stops=plannerItems.map(key=>({key,item:keyToItem(key)})).filter(s=>s.item?.lat);
  if(stops.length===0){el.innerHTML='<div class="planner-empty">Dodane atrakcje nie mają współrzędnych GPS.</div>';return;}
  const {order}=solveTSP(stops);
  const ord=order.map(i=>stops[i]);
  let total=haversine(WROCLAW.lat,WROCLAW.lng,ord[0].item.lat,ord[0].item.lng);
  let html=`<div class="planner-route"><div class="planner-route-item"><span class="planner-route-step">🏠</span><span class="planner-route-name">Wrocław (start)</span></div>`;
  ord.forEach((s,i)=>{
    const prev=i===0?WROCLAW:{lat:ord[i-1].item.lat,lng:ord[i-1].item.lng};
    const d=haversine(prev.lat,prev.lng,s.item.lat,s.item.lng);
    if(i>0)total+=d;
    html+=`<div class="planner-route-item"><span class="planner-route-step">${i+1}</span><span class="planner-route-name">${s.item.name}</span><span class="planner-route-dist">+${d} km</span><button class="planner-remove-btn" onclick="togglePlanItem('${s.key}',this)">✕</button></div>`;
  });
  const back=haversine(ord[ord.length-1].item.lat,ord[ord.length-1].item.lng,WROCLAW.lat,WROCLAW.lng);
  total+=back;
  html+=`<div class="planner-route-item"><span class="planner-route-step">🏠</span><span class="planner-route-name">Wrocław (powrót)</span><span class="planner-route-dist">+${back} km</span></div></div>`;
  html+=`<div class="planner-summary"><div class="planner-sum-item">Łączny dystans: <strong>${total} km</strong></div><div class="planner-sum-item">Atrakcji: <strong>${ord.length}</strong></div></div>`;
  const coords=ord.map(s=>`${s.item.lat},${s.item.lng}`).join('/');
  html+=`<div class="planner-actions">
    <a class="planner-gmaps-btn" href="https://www.google.com/maps/dir/Wroclaw/${coords}/Wroclaw" target="_blank">🗺️ Google Maps</a>
    <button style="border:1.5px solid var(--accent);color:var(--accent);background:transparent;" onclick="clearPlanner()">✕ Wyczyść trasę</button>
  </div>`;
  el.innerHTML=html;
}

window.clearPlanner=function(){plannerItems=[];savePl();updatePlannerBadge();renderPlanner();};

// ════════════════════════════════════════════════════
// MAPA LEAFLET
// ════════════════════════════════════════════════════
window.mapFilter=function(mode,btn){
  mapFilterMode=mode;
  document.querySelectorAll('.map-ctrl-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  updateMapMarkers();
};

function initLeafletMap(){
  if(!window.L)return;
  if(leafletMap){leafletMap.invalidateSize();updateMapMarkers();return;}
  leafletMap=L.map('leaflet-map',{center:[52.0,19.5],zoom:6});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(leafletMap);
  const leg=document.getElementById('map-legend');
  leg.innerHTML=DATA.map(cat=>`<div style="display:flex;align-items:center;gap:4px;"><div style="width:10px;height:10px;border-radius:50%;background:${cat.color};flex-shrink:0;"></div><span>${cat.cat}</span></div>`).join('');
  updateMapMarkers();
}

function updateMapMarkers(){
  if(!leafletMap||!window.L)return;
  mapMarkers.forEach(m=>m.remove()); mapMarkers=[];
  DATA.forEach((cat,ci)=>{
    cat.items.forEach((item,ii)=>{
      if(!item.lat||!item.lng)return;
      const key=getKey(ci,ii);
      const done=!!checked[key];
      if(mapFilterMode==='done'&&!done)return;
      if(mapFilterMode==='todo'&&done)return;
      const col=done?'#4a6741':cat.color;
      const icon=L.divIcon({html:`<div style="width:12px;height:12px;border-radius:50%;background:${col};border:2px solid white;box-shadow:0 1px 3px rgba(0,0,0,.4);"></div>`,className:'',iconSize:[12,12]});
      const m=L.marker([item.lat,item.lng],{icon}).addTo(leafletMap);
      m.bindPopup(`<strong style="font-size:13px">${item.name}</strong><br><small style="color:#666">${item.short||''}</small><br><button onclick="switchTab('lista');setTimeout(()=>openModal(${ci},${ii},'${key}'),300)" style="margin-top:5px;padding:3px 8px;font-size:11px;cursor:pointer;background:#e8753a;color:white;border:none;border-radius:3px;">📖 Szczegóły</button>`);
      mapMarkers.push(m);
    });
  });
}

// ════════════════════════════════════════════════════
// START
// ════════════════════════════════════════════════════
render();
updatePlannerBadge();
if(window.L) initLeafletMap();
</script>
