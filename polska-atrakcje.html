<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1a2e;--paper:#f5f0e8;--parchment:#ede8d8;--accent:#8b2c2c;--gold:#c9a84c;--moss:#4a6741;--sky:#4a7fa5;--muted:#8a8070;--checked-bg:#eaf5ea;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Lato',sans-serif;min-height:100vh;}
header{background:var(--ink);color:var(--paper);padding:2rem 1.5rem 1.8rem;text-align:center;position:relative;overflow:hidden;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--gold),var(--moss),var(--sky),var(--accent));}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,5vw,2.8rem);font-weight:900;}
h1 span{color:var(--gold);}
.subtitle{font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,240,232,.5);margin-top:.3rem;font-weight:300;}
.controls{display:flex;flex-wrap:wrap;gap:.6rem;padding:1rem 1.2rem;background:var(--parchment);border-bottom:1px solid rgba(0,0,0,.08);align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.stats{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--muted);}
.stats strong{color:var(--moss);font-size:1.1rem;}
.btn-group{display:flex;gap:.4rem;flex-wrap:wrap;}
button{font-family:'Lato',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.4rem .9rem;border:1.5px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;transition:all .18s;border-radius:2px;}
button:hover{background:var(--ink);color:var(--paper);}
button.danger{border-color:var(--accent);color:var(--accent);}
button.danger:hover{background:var(--accent);color:var(--paper);}
.progress-bar{height:3px;background:rgba(0,0,0,.08);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--moss),var(--gold));transition:width .4s ease;}
.category-section{margin:0;}
.category-header{display:flex;align-items:center;gap:.7rem;padding:.9rem 1.2rem .4rem;cursor:pointer;user-select:none;}
.category-header h2{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);flex:1;}
.cat-count{font-size:.72rem;color:var(--muted);font-weight:300;}
.cat-toggle{font-size:.72rem;color:var(--muted);transition:transform .2s;}
.category-section.collapsed .cat-toggle{transform:rotate(-90deg);}
.category-section.collapsed .items-list{display:none;}
.items-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:0;padding:0 .8rem .8rem;}
.item{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .7rem;cursor:pointer;border-radius:4px;transition:background .15s;user-select:none;}
.item:hover{background:rgba(0,0,0,.04);}
.item.checked{background:var(--checked-bg);}
.item.checked .item-name{text-decoration:line-through;color:var(--moss);opacity:.75;}
.item.checked .item-short{opacity:.5;}
.checkbox{width:17px;height:17px;min-width:17px;border:2px solid rgba(0,0,0,.22);border-radius:3px;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s;font-size:.65rem;color:white;background:transparent;}
.item.checked .checkbox{background:var(--moss);border-color:var(--moss);}
.item-idx{font-size:.62rem;font-weight:700;color:var(--muted);min-width:20px;text-align:right;margin-top:3px;}
.item-body{flex:1;min-width:0;}
.item-name{font-weight:700;font-size:.85rem;color:var(--ink);line-height:1.3;}
.item-short{font-size:.7rem;color:var(--muted);font-weight:300;margin-top:.1rem;line-height:1.35;}
.item-meta{display:flex;gap:.5rem;margin-top:.25rem;flex-wrap:wrap;}
.badge{font-size:.6rem;font-weight:700;letter-spacing:.06em;padding:.15rem .4rem;border-radius:2px;text-transform:uppercase;}
.badge-dist{background:rgba(74,127,165,.12);color:var(--sky);}
.badge-time{background:rgba(74,103,65,.12);color:var(--moss);}
.info-btn{font-size:.6rem;font-weight:700;letter-spacing:.06em;padding:.15rem .45rem;border-radius:2px;background:rgba(201,168,76,.15);color:#8a6a10;border:none;cursor:pointer;margin-left:auto;white-space:nowrap;transition:background .15s;}
.info-btn:hover{background:rgba(201,168,76,.35);}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,0,0,.07),transparent);margin:0 1.2rem;}
.hidden{display:none!important;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,10,20,.65);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--paper);width:100%;max-width:520px;max-height:88vh;border-radius:12px 12px 0 0;overflow:hidden;display:flex;flex-direction:column;transform:translateY(40px);transition:transform .28s ease;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-img{width:100%;height:200px;object-fit:cover;background:#d4cfc5;flex-shrink:0;}
.modal-img-placeholder{width:100%;height:200px;background:linear-gradient(135deg,var(--parchment),#d4cfc5);display:flex;align-items:center;justify-content:center;font-size:3rem;flex-shrink:0;}
.modal-body{padding:1.2rem 1.4rem 1.6rem;overflow-y:auto;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;color:var(--ink);line-height:1.25;}
.modal-badges{display:flex;gap:.5rem;margin:.6rem 0 .9rem;flex-wrap:wrap;}
.modal-badge{font-size:.68rem;font-weight:700;padding:.2rem .55rem;border-radius:3px;letter-spacing:.07em;text-transform:uppercase;}
.modal-nav-btn{display:inline-block;padding:.5rem 1.2rem;background:var(--moss);color:white;text-decoration:none;border-radius:4px;font-size:.82rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin:.2rem 0 .5rem;}
.modal-nav-btn:hover{background:#3a5233;}
.modal-desc{font-size:.88rem;line-height:1.7;color:#3a3530;}
.modal-close{position:absolute;top:.8rem;right:.9rem;width:2rem;height:2rem;border-radius:50%;background:rgba(0,0,0,.35);color:white;border:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;z-index:101;}
.modal-wrapper{position:relative;width:100%;max-width:520px;}

@media(min-width:600px){
  .modal-overlay{align-items:center;}
  .modal{border-radius:12px;max-height:80vh;}
  .modal-img,.modal-img-placeholder{height:240px;}
}
</style>
</head>
<body>

<header>
  <h1>Atrakcje <span>Polski</span></h1>
  <div class="subtitle">Lista miejsc do odkrycia</div>
</header>

<div class="controls">
  <div class="stats">Zaliczone: <strong id="cnt">0</strong> / 50</div>
  <div class="btn-group">
    <button onclick="filterView('all')" id="f-all">Wszystkie</button>
    <button onclick="filterView('todo')" id="f-todo">Do zrobienia</button>
    <button onclick="filterView('done')" id="f-done">Zaliczone</button>
    <button class="danger" onclick="clearAll()">Resetuj</button>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="bar" style="width:0%"></div></div>

<div id="app"></div>

<div class="modal-overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal-wrapper">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal" id="modal">
      <div id="modal-img-wrap"></div>
      <div class="modal-body">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-badges">
          <a class="modal-nav-btn" id="modal-nav" href="#" target="_blank" rel="noopener">🗺️ Nawiguj</a>
        </div>
        <div class="modal-desc" id="modal-desc"></div>
      </div>
    </div>
  </div>
</div>

<script>
const DATA = [
  { cat: "🏔️ Dolny Śląsk", items: [
    {name:"Zamek Książ – Wałbrzych", short:"Największy zamek na Dolnym Śląsku, 400 komnat, tajemne tunele projektu Riese", km:70, time:"55 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Zamek_Ksi%C4%85%C5%BC_-_panoramio_%281%29.jpg/1280px-Zamek_Ksi%C4%85%C5%BC_-_panoramio_%281%29.jpg", desc:"Zamek Książ to trzecia co do wielkości warownia w Polsce i największy zamek na Dolnym Śląsku, górujący nad lasami Puszczy Świdnickiej. Historia zamku sięga XIII wieku, kiedy Bolko I Surowy wzniósł pierwszą gotycką warownię. Przez wieki był siedzibą rodu von Hochberg, jednej z najbogatszych rodzin śląskich. Podczas II wojny światowej Niemcy wykuli tu tajemniczą sieć tuneli projektu Riese, których przeznaczenie do dziś budzi kontrowersje. Turystom udostępniono Salę Maksymiliana, Salę Konrada i tarasy widokowe z panoramą Gór Sowich. Dolina rzeki Pełcznicy tworzy malowniczy park ze stawami i bogatą dendroflorą. Stadnina koni w Książu słynie z hodowli koni arabskich czystej krwi. Bliskość Wrocławia sprawia, że to idealne miejsce na jednodniową wycieczkę. To jeden z najpiękniejszych zamków w Polsce, zachwycający architekturą i malowniczym położeniem."},
    {name:"Kościół Pokoju – Świdnica", short:"Drewniany kościół UNESCO, 7500 miejsc, barokowe wnętrze i organy z XVII w.", km:65, time:"50 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/94/Kosciol_Pokoju_Swidnica.jpg/1280px-Kosciol_Pokoju_Swidnica.jpg", desc:"Kościół Pokoju w Świdnicy to jeden z dwóch zachowanych drewnianych kościołów pokoju na Dolnym Śląsku, wpisany na Listę UNESCO. Zbudowany w 1657 roku zgodnie z traktatem westfalskim, musiał spełniać surowe warunki cesarza: żadnych fundamentów, dzwonnic ani cegieł. Pomimo ograniczeń pomieścił 7500 wiernych, stając się jedną z największych drewnianych budowli sakralnych w Europie. Wnętrze zachwyca barokowym wystrojem z emporami, ołtarzem i organami o niezwykłej barwie dźwięku. Malowidła stropowe tworzą kompletny program ikonograficzny. Kościół jest czynną świątynią ewangelicką i centrum kulturalnym. Doroczne koncerty muzyki organowej przyciągają melomanów z całej Europy. Perła architektury sakralnej niemal za progiem."},
    {name:"Śnieżka – Karkonosze", short:"Najwyższy szczyt Polski (1603 m), stacja UFO, szlak z Karpacza 3–4h", km:110, time:"1h 20 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Sniezka_1.jpg/1280px-Sniezka_1.jpg", desc:"Śnieżka (1603 m n.p.m.) to najwyższy szczyt Karkonoszy i Sudetów, leżący na granicy polsko-czeskiej. Wejście szlakiem z Karpacza zajmuje 3–4 godziny przez lasy świerkowe i kosodrzewinę. Na szczycie stoi charakterystyczna stacja meteorologiczna w kształcie UFO — symbol Karkonoszy. Karkonoski Park Narodowy chroni unikalne subalpejskie ekosystemy z endemicznymi gatunkami roślin. Kocioł Małego i Dużego Stawu Śnieżnego to imponujące cyrki polodowcowe. Karpacz u podnóża zachwyca drewnianym kościółkiem Wang przeniesionym z Norwegii w XIII wieku. Wyciąg krzesełkowy ze stacji Kopa skraca wejście dla mniej wprawionych. Zimą Karkonosze to centrum narciarskie z trasami w Karpaczu i Szklarskiej Porębie."},
    {name:"Jaskinia Niedźwiedzia – Kletno", short:"Najpiękniejsza jaskinia Dolnego Śląska, stalaktyty, szczątki niedźwiedzi jaskiniowych", km:110, time:"1h 20 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Jaskinia_Niedzwiedzia.jpg/1280px-Jaskinia_Niedzwiedzia.jpg", desc:"Jaskinia Niedźwiedzia w Kletnie to jedna z najpiękniejszych jaskiń w Polsce, odkryta przypadkowo w 1966 roku podczas prac górniczych. Nazwa pochodzi od setek szczątków jaskiniowych niedźwiedzi znalezionych w osadach. Stalaktyty, stalagmity i polewy naciekowe tworzą niesamowitą kolekcję form kalcytowych o niezwykłych kształtach i barwach. Temperatura stała 6–7°C wymaga ciepłego ubrania. Trasa turystyczna liczy 700 metrów przez Salę Niedźwiedzia, Salę Zbójników i Salę Stalaktytu. Mikroklimat jaskini korzystny jest dla osób z chorobami dróg oddechowych. Zwiedzanie odbywa się wyłącznie z przewodnikiem. Najpiękniejsza jaskinia na Dolnym Śląsku i jedna z pięciu udostępnionych turystycznie w Polsce."},
    {name:"Kopalnia Uranu – Kletno", short:"Jedyna taka w Polsce, tajny sowiecki projekt atomowy 1948–1953, podziemny wodospad", km:110, time:"1h 20 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Sleza_mountain.jpg/1280px-Sleza_mountain.jpg", desc:"Kopalnia Uranu w Kletnie to jedno z najbardziej intrygujących miejsc na Dolnym Śląsku, przez dziesięciolecia owiane tajemnicą wojskową. Eksploatacja rud uranu na potrzeby radzieckiego programu atomowego trwała od 1948 do 1953 roku. Podziemna trasa prowadzi przez historyczne chodniki z oryginalnymi narzędziami górniczymi. Największą atrakcją jest podziemny wodospad arszenianu żelaza — zjawisko nieznane w innych europejskich kopalniach. Kletno leży w masywie Śnieżnika obok słynnej Jaskini Niedźwiedziej. Historia kopalni to lekcja geopolityki XX wieku i ceny, jaką Polska zapłaciła za powojenne uzależnienie. Idealne połączenie z Jaskinią Niedźwiedzią w jeden dzień."},
    {name:"Wodospad Kamieńczyka", short:"Najwyższy wodospad Sudetów, 27 m, Szklarska Poręba, 30 min szlakiem", km:120, time:"1h 30 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/Wodospad_Kamienczyka.jpg/800px-Wodospad_Kamienczyka.jpg", desc:"Wodospad Kamieńczyka to najwyższy wodospad w polskich Sudetach, skaczący kilkoma kaskadami z łączną wysokością około 27 metrów po granitowych progach. Woda potoku Kamieńczyk spada spektakularnie przez skalny kocioł tworząc obłoki mgły i tęcze. Szlak z centrum Szklarskiej Poręby zajmuje około 30 minut wzdłuż potoku przez las. Mostki umożliwiają podziwianie z różnych perspektyw. Wiosną i jesienią wodospad prezentuje największą moc. Szklarska Poręba to centrum turystyczne Karkonoszy z wyciągami narciarskimi i uzdrowiskiem. Fabryka Kryształów Ludwik z 1841 roku to dodatkowa atrakcja. Efektowna wycieczka idealna na popołudnie."},
    {name:"Szczeliniec Wielki – Góry Stołowe", short:"Labirynt skalny 919 m, skałki Słoń i Wielbłąd, panorama Kotliny Kłodzkiej", km:115, time:"1h 25 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Szczeliniec_Wielki.jpg/1280px-Szczeliniec_Wielki.jpg", desc:"Szczeliniec Wielki (919 m) to najwyższy szczyt Gór Stołowych i jedno z najciekawszych geologicznie miejsc w Polsce. Przez szczeliny i skalne przejścia wije się ścieżka między skałami o nazwach Słoń, Wielbłąd i Klęcznik. Panorama z krawędzi obejmuje Kotlinę Kłodzką, Czechy i pasmo Śnieżnika — nagroda za 800 schodów wejścia. Błędne Skały w pobliżu to kolejny efektowny labirynt skalny. Park Narodowy Gór Stołowych chroni unikalne piaskowcowe ekosystemy. Jeden z nielicznych w Polsce krajobrazów o charakterze środkowoeuropejskiego plateau. Szybka i efektowna wycieczka w zasięgu Wrocławia."},
    {name:"Zamek Czocha", short:"Gotyk na cyplu nad Jeziorem Leśniańskim, obozy Harry'ego Pottera, biała dama", km:110, time:"1h 20 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Zamek_Czocha.jpg/1280px-Zamek_Czocha.jpg", desc:"Zamek Czocha to jedna z najpiękniejszych i najbardziej tajemniczych warowni Dolnego Śląska, wzniesiona na skalnym cyplu nad Jeziorem Leśniańskim. Historia zamku sięga XIII wieku. Obecny romantyczny kształt z machikulami i blankami pochodzi z przebudowy Ernsta Gütschowa z początku XX wieku. Zamek zasłynął jako pierwowzór Hogwartu — tu organizowane są obozy dla fanów Harry'ego Pottera. Podziemia kryją tajemne przejścia i lochy, a legenda mówi o białej damie nawiedzającej komnaty. Zamek oferuje noclegi w historycznych wnętrzach. Idealne na romantyczny weekend lub rodzinną przygodę."},
    {name:"Kłodzko – Twierdza", short:"Pruskie fortyfikacje z 40 km tuneli, gotycki most jak Praski, miasto UNESCO", km:90, time:"1h 10 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Klodzko_twierdza.jpg/1280px-Klodzko_twierdza.jpg", desc:"Kłodzko i jego twierdza to jedne z najciekawszych militarnych zabytków w Polsce. Twierdza Kłodzka budowana przez Prusaków od 1622 roku to rozległe fortyfikacje bastionowe z podziemnymi tunelami o długości ponad 40 km. Turystyczna trasa podziemna prowadzi przez galerie i kazamaty. Gotycki most z rzeźbami świętych — wzorowany na Moście Karola w Pradze — to najpiękniejszy zabytek gotycki miasta. Kotlina Kłodzka to jeden z najbogatszych turystycznie regionów Dolnego Śląska. Baza wypadowa do Szczelińca, Jaskini Niedźwiedziej i Lądka-Zdroju. Nieodkryta perła Dolnego Śląska."},
    {name:"Złoty Stok – Kopalnia Złota", short:"Jedyna kopalnia złota w Polsce, XIV w., podziemny wodospad arszenianu", km:100, time:"1h 15 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Sleza_mountain.jpg/1280px-Sleza_mountain.jpg", desc:"Kopalnia Złota w Złotym Stoku to jedyna udostępniona kopalnia złota w Polsce z historią sięgającą XIV wieku. Podziemna trasa prowadzi przez 600 metrów historycznych chodników z oryginalnymi urządzeniami i efektami specjalnymi. Największą atrakcją jest podziemny wodospad arszenianu żelaza — nieznany w innych europejskich kopalniach. Temperatura w kopalni to stałe 8°C. Muzeum Kopalnictwa prezentuje historię wydobycia złota na Dolnym Śląsku. Złoty Stok leży w Kotlinie Kłodzkiej blisko Lądka-Zdroju i rzeki Nysy Kłodzkiej. Fascynujące połączenie historii, mineralogii i przyrody Sudetów."},
    {name:"Wrocław – Rynek i Ostrów Tumski", short:"Miasto stu mostów, gotycki Ratusz, katedra, 600+ krasnoludków, Hala Stulecia UNESCO", km:40, time:"35 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Wroclaw_rynek.jpg/1280px-Wroclaw_rynek.jpg", desc:"Wrocław to jedno z najpiękniejszych miast Polski, zwane miastem stu mostów i krasnoludków. Rynek wrocławski otaczają przepiękne gotyckie i barokowe kamienice z Ratuszem z XIV–XVI wieku na czele. Ostrów Tumski — najstarsza część miasta — to skupisko kościołów i klasztorów o wyjątkowej atmosferze. Katedra Świętego Jana Chrzciciela z gotycką wieżą kryje szczątki pierwszych biskupów wrocławskich. Słynne wrocławskie krasnale — ponad 600 metalowych figurek — stały się miejską legendą i zabawą dla całej rodziny. Hala Stulecia z 1913 roku jest wpisana na Listę UNESCO. Jarmark bożonarodzeniowy i festiwal świateł przyciągają turystów z całej Europy. Absolutny must-see, szczególnie bliski stąd."},
    {name:"SkyTower – taras widokowy (Wrocław)", short:"Najwyższy budynek w Polsce, 212 m, widok 360°, Karkonosze w tle", km:40, time:"35 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/aa/Sky_Tower_Wroclaw.jpg/800px-Sky_Tower_Wroclaw.jpg", desc:"SkyTower we Wrocławiu to najwyższy budynek w Polsce, mierzący 212 metrów. Taras widokowy na 49. piętrze (180 m) oferuje panoramę 360° — w pogodne dni widać Karkonosze i rozległe niziny. Szklana podłoga umożliwia dosłowne stanięcie nad miastem. Wrocław z lotu ptaka zdradza swój wyjątkowy charakter: ramiona Odry, wyspy i historyczne centrum. Restauracja na wyższych piętrach zapewnia doznania kulinarne z widokiem. Nocna panorama z setykami świateł i odbicia w Odrze to niepowtarzalne doświadczenie. Obowiązkowy punkt wizyty we Wrocławiu."},
    {name:"Mandoria – Park Rozrywki", short:"Nowoczesny park przygody pod Wrocławiem, parki linowe, basen, atrakcje dla dzieci", km:30, time:"25 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Wroclaw_Szczodre.jpg/800px-Wroclaw_Szczodre.jpg", desc:"Mandoria to nowoczesny park rozrywki i przygody pod Wrocławiem, w Dolinie Bystrzycy. Park oferuje tory przeszkód, linowe parki wspinaczkowe, zjeżdżalnie i place zabaw. Strefa Kids Arena to kryte atrakcje dostępne niezależnie od pogody. Basen z zjeżdżalniami to główny magnes letnich odwiedzin. Bliskość Wrocławia i łatwy dojazd autostradą A4 czynią Mandorię najłatwiej dostępnym parkiem rozrywki w regionie. Park rozbudowuje ofertę co sezon. Idealne miejsce na jednodniową wycieczkę z dziećmi bez długiego dojazdu."},
    {name:"SuliCamp – Sulistrowiczki", short:"Ślęża – święta góra Słowian 718 m, schronisko, amfiteatr, jezioro kąpielowe", km:45, time:"40 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Sleza_mountain.jpg/1280px-Sleza_mountain.jpg", desc:"SuliCamp w Sulistrowiczkach to popularny ośrodek rekreacyjny u podnóża Ślęży — świętej góry Słowian. Ślęża (718 m) to miejsce kultu prasłowiańskiego z romańskim kościółkiem z XII wieku i posągami słowiańskimi. Szlak na szczyt zajmuje 2 godziny. Amfiteatr SuliCampu gości koncerty i festiwale plenerowe. Ośrodek ma camping i pole namiotowe. Jezioro Sulistrowickie oferuje kąpielisko w sezonie. Sobótka u podnóża z Muzeum Ślężańskim uzupełnia atrakcje kulturowe. Oaza spokoju i natury blisko Wrocławia."},
    {name:"Muzeum Broni – Świdnica", short:"Militaria od średniowiecza, twierdza świdnicka, rynek z kościołem farnym", km:65, time:"50 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Swidnica_rynek.jpg/1280px-Swidnica_rynek.jpg", desc:"Muzeum Militariów w Świdnicy prezentuje bogatą historię dawnego centrum handlowego i militarnego na Dolnym Śląsku. Świdnica przez wieki była centrum handlu słynnym piwem świdnickim i siedzibą Piastów świdnickich. Muzeum gromadzi bronie białą i palną, mundury i wyposażenie wojskowe od średniowiecza po współczesność. Rynek z barokowym kościołem farnym to urokliwe centrum spacerowe. Kościół Pokoju tuż obok to bezcenny zabytek UNESCO. Świdnica to niedoceniana perła Dolnego Śląska warta pełnodniowej wizyty. Połącz z Kościołem Pokoju i zamkiem dla pełnego obrazu."},
    {name:"Muzeum WENA – Oława", short:"Historia Dolnego Śląska, zamek piastowski XIV w., szlaki rowerowe nad Oławą", km:40, time:"35 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Olawa_rynek.jpg/1280px-Olawa_rynek.jpg", desc:"Oława to urocze miasto na Dolnym Śląsku z ciekawą historią, leżące nad rzeką Oławą. Muzeum w Oławie prezentuje historię miasta i regionu. Zamek Piastowski z XIV wieku to historyczny punkt odniesienia. Rynek z kamienicami mieszczańskimi tworzy przyjemne centrum spacerowe. Tereny nadoławskie oferują szlaki rowerowe przez łąki i lasy. Kościół Wniebowzięcia NMP z XIV wieku to ważny zabytek sakralny. Oława jest dobrą bazą do zwiedzania Mosznej, Wrocławia i okolic. Spokojne, sympatyczne miasto przy objeździe Dolnego Śląska."},
    {name:"Kolej parowa (retro trasa turystyczna)", short:"Muzeum Kolejnictwa w Jaworzynie Śląskiej, przejazdy parowozem, klimat epoki pary", km:75, time:"55 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Narrow_gauge_railway_Poland.jpg/1280px-Narrow_gauge_railway_Poland.jpg", desc:"Muzeum Kolejnictwa w Jaworzynie Śląskiej gromadzi imponującą kolekcję historycznych lokomotyw i wagonów. Przejazdy parowozem oferują podróż sprzed stu lat. Dym z komina, stukot kół i gwizd pary tworzą niezapomnianą atmosferę. Dolnośląska Kolej Dojazdowa to żywy pomnik historii technicznej. Dla dzieci przejazd parowozem to bajkowe przeżycie. Fotografowie cenią dramatyczne sylwetki starych lokomotyw. Podróż w czasie dostępna niedaleko Wrocławia."}
  ]},
  { cat: "🏰 Małopolska", items: [
    {name:"Zamek Królewski na Wawelu", short:"Symbol Polski, 5 wieków historii, smocza jama, skarbiec z insygniami", km:270, time:"2h 50 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Krakow_-_Wawel_from_Vistula_2.jpg/1280px-Krakow_-_Wawel_from_Vistula_2.jpg", desc:"Zamek Królewski na Wawelu to najważniejszy zabytek w Polsce i symbol polskiej państwowości, wzniesiony na skalistym wzgórzu nad Wisłą. Rezydencja królów polskich przez ponad pięć stuleci była centrum życia politycznego kraju. Zamek kryje komnaty królewskie z arrasami, skarbiec z insygniami koronacyjnymi i zbrojownię. Na szczególną uwagę zasługuje Smocza Jama — legendarna jaskinia zamieszkana niegdyś przez wawelskiego smoka. Katedra wawelska to miejsce pochówku królów i wielkich Polaków. Dziedziniec z renesansowymi krużgankami uważany jest za jedno z najpiękniejszych wnętrz architektonicznych w Europie Środkowej. Obowiązkowy punkt każdej podróży do dawnej stolicy Polski."},
    {name:"Stare Miasto – Kraków", short:"Rynek Główny UNESCO, Sukiennice, Kościół Mariacki, hejnał, Barbakan", km:270, time:"2h 50 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f8/Krakow_rynek.jpg/1280px-Krakow_rynek.jpg", desc:"Krakowskie Stare Miasto wpisane na Listę UNESCO jest jednym z najlepiej zachowanych średniowiecznych centrów miejskich w Europie. Serce miasta to Rynek Główny z Sukiennicami z XVI wieku. Kościół Mariacki słynie z gotyckiego ołtarza Wita Stwosza i hejnału co godzinę. Kazimierz, dawna dzielnica żydowska, to perła z synagogami i klimatycznymi kawiarniami. Podziemia Rynku to nowoczesne muzeum archeologiczne. Kraków jako jedyne polskie miasto uniknął poważnych zniszczeń wojennych. Miasto, które trzeba zobaczyć choć raz w życiu."},
    {name:"Tatry i Morskie Oko", short:"Najwyższe góry Polski, jezioro 1395 m, Rysy 2499 m, szlak 9 km z Palenicy", km:370, time:"3h 50 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Morskie_Oko_Tatry_2.JPG/1280px-Morskie_Oko_Tatry_2.JPG", desc:"Tatry to najwyższe pasmo górskie w Polsce, będące polsko-słowackim parkiem narodowym. Morskie Oko to największe i najpiękniejsze jezioro tatrzańskie, leżące na 1395 m n.p.m. w głębokim kotle skalnym. Droga z Palenicy Białczańskiej liczy 9 km przez Dolinę Rybiego Potoku — jeden z najpopularniejszych szlaków w Polsce. Rysy (2499 m) to najwyższy szczyt Polski. Tatry oferują też łagodniejsze trasy: Dolinę Kościeliską i Chochołowską. Zakopane u podnóża to centrum góralszczyzny z Krupówkami. W zimie Tatry zamieniają się w raj narciarski. Zachwyca w każdej porze roku."},
    {name:"Kopalnia Soli – Wieliczka", short:"UNESCO, 7 wieków wydobycia, Kaplica Świętej Kingi w soli, 135 m głębokości", km:270, time:"2h 50 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Wieliczka_Salt_Mine%2C_Chapel_of_St._Kinga.jpg/1280px-Wieliczka_Salt_Mine%2C_Chapel_of_St._Kinga.jpg", desc:"Kopalnia Soli w Wieliczce to jedno z najważniejszych miejsc na Liście UNESCO, eksploatowana od XIII do 2007 roku. Trasa prowadzi przez 22 komory i 3,5 km korytarzy na głębokości 64–135 metrów. Kaplica Świętej Kingi — kryształowe cacko wykute w soli, z ołtarzem i żyrandolami — to arcydzieło górniczej sztuki. Kopalnia zachwyca jeziorami solnymi i setkami figur wyrzeźbionych przez górników. Mikroklimat korzystny dla osób z chorobami dróg oddechowych. Wieliczka leży 15 km od centrum Krakowa. Miejsca, które trudno opisać słowami."},
    {name:"Energylandia – Zator", short:"Największy park rozrywki w Polsce, 100+ atrakcji, Hyperion 100 km/h, aquapark", km:280, time:"3h 00 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Energylandia_park_rozrywki.jpg/1280px-Energylandia_park_rozrywki.jpg", desc:"Energylandia w Zatorze to największy park rozrywki w Polsce, przyciągający ponad milion gości rocznie. Park oferuje ponad 100 atrakcji. Hyperion — jeden z największych drewnianych rollercoasterów w Europie — przekracza 100 km/h. Aquapark z basenami i zjeżdżalniami to idealna atrakcja na gorące dni. Strefa Bajkowe Miasto świetna dla maluchów. Park stale rozbudowuje ofertę. Nocleg w pobliżu pozwala zwiedzić park przez dwa dni. Gwarantuje niezapomniany dzień pełen wrażeń dla całej rodziny."},
    {name:"Jura Krakowsko-Częstochowska", short:"Białe skałki wapienne, Ojcowski PN, Grota Łokietka, Szlak Orlich Gniazd", km:250, time:"2h 40 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Dolina_Pradnika_Ojcow.jpg/1280px-Dolina_Pradnika_Ojcow.jpg", desc:"Jura Krakowsko-Częstochowska to pasmo wapiennych wyżyn od Krakowa po Częstochowę, słynące z białych skałek i zamkowych ruin na Szlaku Orlich Gniazd. Ojcowski Park Narodowy chroni Dolinę Prądnika z Maczugą Herkulesa i Grotą Łokietka. Pieskowa Skała, zamek renesansowy na skale, mieści galerię sztuki europejskiej. Szlak Orlich Gniazd to jeden z najpopularniejszych w Polsce. Doliny Jury z lasami bukowymi są rajem dla rowerzystów. Lokalny ser jurajski i wyroby pszczelarskie to smakołyki regionu. Surowe piękno polskiego krajobrazu."},
    {name:"Kazimierz Dolny", short:"Renesansowe miasteczko nad Wisłą, wąwozy lessowe, galerie artystyczne, słynny chleb", km:390, time:"4h 00 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Kazimierz_Dolny.jpg/1280px-Kazimierz_Dolny.jpg", desc:"Kazimierz Dolny to jedno z najpiękniejszych i najchętniej malowanych miasteczek w Polsce, w malowniczym jarze wiślanym. Renesansowa kamienica Przybyłów to perła renesansu mieszczańskiego. Ruiny zamku Kazimierza Wielkiego oferują panoramę Wisły. Wąwozy lessowe Korzeniowy Dół i Albrechtówka to unikalne krajobrazy erozji w Europie. Kazimierz to od XX wieku centrum artystyczne skupiające malarzy i poetów. Słynny chleb kazimierski to lokalny obowiązek kulinarny. Miasteczko do chodzenia pieszo i odkrywania zaułków."},
    {name:"Zalipie – malowana wieś", short:"Domy pokryte kwiatowymi malowidłami, konkurs Malowana Chata, warsztaty malarskie", km:310, time:"3h 20 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Zalipie_painted_house.jpg/1280px-Zalipie_painted_house.jpg", desc:"Zalipie to wyjątkowa wioska małopolska słynąca z tradycji malowania domów, zagród i płotów w bogate wzory kwiatowe. Tradycja sięga przełomu XIX i XX wieku. Każdy dom w Zalipiu to dzieło sztuki — bukiety kwiatów pokrywają ściany, okna i drzwi. Konkurs Malowana Chata co roku przyciąga tysiące turystów. Dom Felicji Curyłowej prezentuje wzorcowe wnętrze najwybitniejszej zalipianki. Kościół parafialny też pokryty jest wzorami kwiatowymi. Warsztaty malarskie uczą tradycyjnych wzorów. Najbarwniejsza wioska w Polsce."},
    {name:"Pieniny – Spływ Dunajcem", short:"Flisacy na tratwach przez przełom, 18 km, Trzy Korony, Czerwony Klasztor", km:360, time:"3h 45 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Dunajec_gorge_rafting.jpg/1280px-Dunajec_gorge_rafting.jpg", desc:"Spływ Dunajcem przez Pieniny to jedna z najbardziej malowniczych atrakcji w Polsce. Flisacy prowadzą tradycyjne tratwy przez głęboki przełom między wapiennymi ścianami. Trasa liczy 18 km od Sromowiec do Szczawnicy — 2–3 godziny z widokami na Trzy Korony i słowacki Czerwony Klasztor. Pieniński Park Narodowy chroni wyjątkową geomorfologię wapienną. Trzy Korony (982 m) to symbol Pienin z panoramą na Tatry. Szczawnica to uzdrowisko z XIX-wieczną tradycją mineralnych wód. Flisacy w tradycyjnych strojach to nieodłączny element spływu. Doświadczenie zachowane w pamięci na długo."}
  ]},
  { cat: "🏛️ Mazowsze", items: [
    {name:"Stare Miasto – Warszawa", short:"UNESCO – odbudowane z gruzów, Syrenka, Zamek Królewski, Barbakan", km:350, time:"3h 30 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Warsaw_Old_Town_Square.jpg/1280px-Warsaw_Old_Town_Square.jpg", desc:"Warszawskie Stare Miasto wpisane na Listę UNESCO to świadectwo woli narodu polskiego odrodzenia po zniszczeniach. Niemcy w 1944 roku celowo zniszczyli niemal całe miasto, jednak zostało odbudowane z niezwykłą wiernością na podstawie obrazów Canaletta. Rynek Starego Miasta otaczają kolorowe kamienice z barokowymi fasadami. Barbakan i mury obronne wyznaczają granicę Starego Miasta. Muzeum Powstania Warszawskiego to obowiązkowy punkt wizyty. Bulwary wiślane o zachodzie słońca to jeden z piękniejszych obrazów Warszawy. Opowieść o niezwykłej determinacji Polaków."},
    {name:"Zamek Królewski w Warszawie", short:"Odbudowany przez naród po 1945, pokoje Bacciarellego, Sala Canaletta, skarbiec", km:350, time:"3h 30 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Warsaw_Royal_Castle.jpg/1280px-Warsaw_Royal_Castle.jpg", desc:"Zamek Królewski w Warszawie to symbol polskiej państwowości, odbudowany po wojnie dzięki ofiarności całego narodu. Przez 150 lat był centrum politycznym Rzeczypospolitej. Sala Balowa z freskami Bacciarellego i Sala Canaletta z widokami Warszawy to klejnoty zamku. Niemcy wysadzili zamek w 1944 roku, lecz Polacy zdążyli ukryć bezcenne dzieła sztuki. Odbudowę zakończono w 1984 roku. Skarbiec kryje insygnia królewskie. Zamek jest częścią Traktu Królewskiego. Symbol narodowego odrodzenia."}
  ]},
  { cat: "⛵ Pomorze", items: [
    {name:"Zamek Krzyżacki – Malbork", short:"Największy gotycki zamek świata UNESCO, Krzyżacy, Nogat, turniej rycerski", km:530, time:"5h 10 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Malbork_Castle_August_2013.jpg/1280px-Malbork_Castle_August_2013.jpg", desc:"Zamek w Malborku to największy gotycki zamek na świecie pod względem powierzchni, wpisany na Listę UNESCO. Zbudowany przez Krzyżaków w XIII–XIV wieku nad Nogatem, pełnił funkcję siedziby Wielkiego Mistrza Zakonu. Kompleks z Zamkiem Wysokim, Średnim i Przedzamczem ma mury ciągnące się ponad 3 km. Muzeum zamkowe gromadzi cenne zbiory bursztynu i broni. Co roku w lipcu odbywa się widowiskowy turniej rycerski. Nocna iluminacja nad Nogatem tworzy magiczne widowisko. Zwiedzanie zajmuje cały dzień."},
    {name:"Gdańsk – Długie Pobrzeże i Starówka", short:"Hanzeatycka starówka, Żuraw portowy XV w., Solidarność, Bazylika Mariacka", km:560, time:"5h 20 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/Gdansk_stare_miasto.jpg/1280px-Gdansk_stare_miasto.jpg", desc:"Gdańsk to jedno z najpiękniejszych miast Polski z historią hanzeatycką i narodzinami Solidarności. Długie Pobrzeże i Długi Targ to ciąg kolorowych kamienicek z bogatymi fasadami. Żuraw — gotycki dźwig portowy z XV wieku — to symbol miasta. Bazylika Mariacka zachwyca gotyckim wnętrzem i panoramą z wieży. Europejskie Centrum Solidarności to wyjątkowe muzeum transformacji 1989. Muzeum II Wojny Światowej wzbudza głęboką refleksję. Spacer wałami o zachodzie słońca to jeden z piękniejszych obrazów Polski."},
    {name:"Hel i Półwysep Helski", short:"35 km piaskowy język piasku w morze, foki szare, Twierdza Hel, surfing", km:600, time:"5h 40 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Hel_peninsula_from_air.jpg/1280px-Hel_peninsula_from_air.jpg", desc:"Półwysep Helski to wyjątkowy twór geograficzny — wąski język piasku wcinający się w Bałtyk na 35 km. Latarnia morska oferuje niesamowity widok na morze z obu stron. Plaże półwyspu należą do najpiękniejszych nad Bałtykiem. Stacja Morska w Helu hoduje i rehabilituje foki szare. Chałupy słyną z surfingu i windsurfingu. Twierdza Hel broniła się do 2 października 1939 roku. Rejs promem z Gdańska to atrakcja sama w sobie. Najdalej wysunięty w morze skrawek Polski."},
    {name:"Toruń – Stare Miasto", short:"UNESCO, Kopernik 1473, gotycki Ratusz, pierniki od średniowiecza, Wisła", km:440, time:"4h 20 min", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Torun_stare_miasto.jpg/1280px-Torun_stare_miasto.jpg", desc:"Toruń to jedno z najlepiej zachowanych średniowiecznych miast w Polsce, wpisane na Listę UNESCO. Miasto urodzenia Mikołaja Kopernika — tu w 1473 roku przyszedł na świat twórca heliocentryzmu. Dom Kopernika to obowiązkowe muzeum. Średniowieczne mury z basztami zachowały się w niezwykłej kompletności. Ratusz z XIV–XVI wieku to jeden z najpiękniejszych gotyckich ratuszy w Europie. Toruń słynie z pierników produkowanych od średniowiecza. Muzeum Piernika oferuje warsztaty wypieku. Nadwiślańskie bulwary z panoramą kościołów to jeden z najpiękniejszych widoków."},

let checked = {};
let currentFilter = 'all';

function save(){ localStorage.setItem('polska-checked-v2', JSON.stringify(checked)); }
function load(){ try{ checked = JSON.parse(localStorage.getItem('polska-checked-v2') || '{}'); } catch(e){ checked = {}; } }

function updateStats(){
  const total = DATA.reduce((s,c)=>s+c.items.length,0);
  const done = Object.values(checked).filter(Boolean).length;
  document.getElementById('cnt').textContent = done;
  document.getElementById('bar').style.width = (done/total*100)+'%';
}

function toggle(key, el, e){
  e && e.stopPropagation();
  checked[key] = !checked[key];
  save();
  el.classList.toggle('checked', !!checked[key]);
  el.querySelector('.checkbox').textContent = checked[key] ? '✓' : '';
  updateStats();
  if(currentFilter !== 'all') applyFilter();
}

window.clearAll = function(){
  if(confirm('Zresetować wszystkie odhaczeń?')){
    checked = {}; save();
    document.querySelectorAll('.item').forEach(el=>{
      el.classList.remove('checked');
      el.querySelector('.checkbox').textContent = '';
    });
    updateStats(); applyFilter();
  }
};

window.filterView = function(f){
  currentFilter = f;
  ['all','todo','done'].forEach(x => document.getElementById('f-'+x).style.background = x===f ? 'var(--ink)' : '');
  ['all','todo','done'].forEach(x => document.getElementById('f-'+x).style.color = x===f ? 'var(--paper)' : '');
  applyFilter();
};

function applyFilter(){
  DATA.forEach((cat,ci)=>{
    cat.items.forEach((item,ii)=>{
      const key = ci+'-'+ii;
      const el = document.getElementById('item-'+key);
      if(!el) return;
      const isDone = !!checked[key];
      const show = currentFilter==='all' || (currentFilter==='done'&&isDone) || (currentFilter==='todo'&&!isDone);
      el.style.display = show ? '' : 'none';
    });
  });
}

function openModal(item){
  document.getElementById('modal-title').textContent = item.name;
  const mapsUrl = 'https://www.google.com/maps/search/'+encodeURIComponent(item.name+' Polska');
  document.getElementById('modal-nav').href = mapsUrl;
  document.getElementById('modal-desc').textContent = item.desc;
  const wrap = document.getElementById('modal-img-wrap');
  wrap.innerHTML = '';
  if(item.img){
    const imgEl = document.createElement('img');
    imgEl.className = 'modal-img';
    imgEl.src = 'https://wsrv.nl/?url='+encodeURIComponent(item.img)+'&w=800&output=jpg';
    imgEl.alt = item.name;
    imgEl.onerror = function(){ this.parentNode.innerHTML = '<div class="modal-img-placeholder">🏔️</div>'; };
    wrap.appendChild(imgEl);
  } else {
    wrap.innerHTML = '<div class="modal-img-placeholder">🏔️</div>';
  }
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

window.closeModal = function(e){
  if(e.target === document.getElementById('overlay')) closeModalBtn();
};
window.closeModalBtn = function(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
};

let globalIdx = 1;

function render(){
  globalIdx = 1;
  load();
  const app = document.getElementById('app');
  app.innerHTML = '';
  DATA.forEach((cat,ci)=>{
    const sec = document.createElement('div');
    sec.className = 'category-section';
    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `<span>${cat.cat.split(' ')[0]}</span><h2>${cat.cat.replace(/^\S+ /,'')}</h2><span class="cat-count">${cat.items.length} miejsc</span><span class="cat-toggle">▾</span>`;
    header.addEventListener('click', ()=> sec.classList.toggle('collapsed'));
    const list = document.createElement('div');
    list.className = 'items-list';
    cat.items.forEach((item,ii)=>{
      const key = ci+'-'+ii;
      const isChecked = !!checked[key];
      const idx = globalIdx++;
      const el = document.createElement('div');
      el.className = 'item'+(isChecked?' checked':'');
      el.id = 'item-'+key;
      el.innerHTML = `
        <span class="item-idx">${String(idx).padStart(2,'0')}</span>
        <span class="checkbox">${isChecked?'✓':''}</span>
        <div class="item-body">
          <div class="item-name">${item.name}</div>
          <div class="item-short">${item.short}</div>
          <div class="item-meta">
            <span class="badge badge-dist">📍 ~${item.km} km</span>
            <span class="badge badge-time">🚗 ${item.time}</span>
            <button class="info-btn" onclick="openModal(DATA[${ci}].items[${ii}])">📖 opis</button>
          </div>
        </div>`;
      el.querySelector('.checkbox').addEventListener('click', e=>toggle(key,el,e));
      el.querySelector('.item-name').addEventListener('click', e=>toggle(key,el,e));
      list.appendChild(el);
    });
    sec.appendChild(header);
    sec.appendChild(list);
    app.appendChild(sec);
    const d = document.createElement('div'); d.className='divider'; app.appendChild(d);
  });
  updateStats(); applyFilter();
}
render();

    if(!deferredPrompt) return;
    const banner = document.createElement('div');
    banner.style.cssText = `position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#f5f0e8;padding:.7rem 1.2rem;border-radius:8px;font-family:Lato,sans-serif;font-size:.82rem;display:flex;align-items:center;gap:.8rem;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:90vw;`;
    banner.innerHTML = `<span>📱 Zainstaluj jako aplikację</span><button id="pwa-install" style="background:#c9a84c;color:#1a1a2e;border:none;padding:.35rem .8rem;border-radius:4px;font-weight:700;cursor:pointer;font-size:.78rem;">Zainstaluj</button><button id="pwa-dismiss" style="background:transparent;color:rgba(245,240,232,.5);border:none;cursor:pointer;font-size:1.1rem;line-height:1;">✕</button>`;
    document.body.appendChild(banner);
    document.getElementById('pwa-install').onclick = ()=>{ deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; banner.remove(); }); };
    document.getElementById('pwa-dismiss').onclick = ()=> banner.remove();
  }, 10000);
});
</script>
</body>
</html>
